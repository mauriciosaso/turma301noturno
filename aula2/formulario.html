<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar</title>
    <style>
        body {
            background-color: #f1f1f1;
            color: #2d2d2d;
            font-family: system-ui;
            text-align: center;
        }

        input {
            text-align: center;
            margin: 5px;
            padding: 5px;
            border: solid 1px;
            border-radius: 15px;
            width: 230px;
            font-size: 16px;
        }

        input[type="checkbox"] {
            margin: 15px;
            width: 20px;
        }

        button {
            margin: 7px;
            padding: 8px;
            width: 90px;
            border-radius: 50px;
            border: none;
            background-color: #2d2d2d;
            color: #f1f1f1;
        }

        div {
            margin: auto;
            margin-top: 120px;
            border: 2px solid #2d2d2d;
            border-radius: 30px;
            width: 350px;
            padding: 20px;
            box-shadow: 10px 10px 20px #2d2d2d;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div>
        <h1>Registrar</h1>
        <input type="text" placeholder="Usuário" />
        <input type="email" placeholder="Email" />
        <input type="password" placeholder="Senha" />
        <input type="password" placeholder="Repita a senha" /><br>
        <input type="checkbox">Aceitar os termos<br>
        <button>Registrar</button>
        <button>Voltar</button>
    </div>
</body>
</html>
